spring.application.name=pantrybuddy

# Database Connection - reads from Railway environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pantry_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}

# Hibernate Strategy
spring.jpa.hibernate.ddl-auto=update

# Show SQL in Console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port - Railway provides $PORT
server.port=${PORT:8082}