<!DOCTYPE html>
<html>
<head>
    <title>PantryBuddy Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; }
        button { background: #2e7d32; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PantryBuddy 🥬</h1>
        <p>Keep track of your veggies!</p>
        
        <h3>Current Items:</h3>
        <ul id="itemList"></ul>
        
        <hr>
        <h3>Add New Item:</h3>
        <input type="text" id="name" placeholder="Item Name (e.g. Tomato)">
        <input type="date" id="expiry">
        <button onclick="addItem()">Add to Pantry</button>
                      
    </div>

    <script>
		async function loadItems() {
		    const response = await fetch('/api/items');
		    const items = await response.json();
		    const list = document.getElementById('itemList');
		    
		    list.innerHTML = items.map(i => `
		        <li>
		            <b>${i.name}</b> - Expires: ${i.expiryDate} 
		            <button onclick="deleteItem(${i.id})" style="background:red; padding:2px 5px; margin-left:10px;">X</button>
		        </li>
		    `).join('');
		}
		

		async function deleteItem(id) {
		    await fetch(`/api/items/${id}`, { method: 'DELETE' });
		    loadItems(); // Refresh the list immediately
		}
		async function addItem() {
		    const nameInput = document.getElementById('name').value;
		    const expiryInput = document.getElementById('expiry').value;

		    // Validation: Don't send empty data
		    if (!nameInput || !expiryInput) {
		        alert("Please enter both a name and an expiry date!");
		        return;
		    }

		    const response = await fetch('/api/items', {
		        method: 'POST',
		        headers: { 'Content-Type': 'application/json' },
		        body: JSON.stringify({ 
		            name: nameInput, 
		            expiryDate: expiryInput 
		        })
		    });

		    if (response.ok) {
		        document.getElementById('name').value = ''; // Clear the name box
		        document.getElementById('expiry').value = ''; // Clear the date box
		        loadItems(); // Refresh the list so the new item appears!
		    } else {
		        alert("Failed to add item. Check your Eclipse console for errors!");
		    }
		}

		// VERY IMPORTANT: Add this line at the bottom so the Spinach shows up when you open the page
		loadItems();
    </script>
</body>
</html>
