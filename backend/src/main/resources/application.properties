spring.application.name=pantrybuddy
# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/pantry_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_password_here}

# 2. Hibernate Strategy (The Magic)
# 'update' means Spring will create your tables automatically based on your Java code
spring.jpa.hibernate.ddl-auto=update

# 3. Show SQL in Console (Helpful for learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8082